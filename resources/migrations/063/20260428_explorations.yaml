## Initial exploration related tables

databaseChangeLog:
  - changeSet:
      id: v63.g43w3qr4
      author: nvoxland
      comment: Create exploration table
      changes:
        - createTable:
            tableName: exploration
            remarks: A user-created data investigation, e.g. "why is revenue down".
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  remarks: Primary key
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: ${text.type}
                  remarks: Human-readable name for the exploration
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: ${text.type}
                  remarks: Optional longer description of what is being investigated
                  constraints:
                    nullable: true
              - column:
                  name: creator_id
                  type: int
                  remarks: User who created the exploration; owns it for permissions
                  constraints:
                    nullable: false
              - column:
                  name: collection_id
                  type: int
                  remarks: Collection this exploration lives in. NULL means the root collection ("Our Analytics"). New explorations default to their creator's Personal Collection.
                  constraints:
                    nullable: true
              - column:
                  name: archived
                  type: ${boolean.type}
                  defaultValueBoolean: false
                  remarks: Whether the exploration has been archived
                  constraints:
                    nullable: false
              - column:
                  name: archived_directly
                  type: ${boolean.type}
                  defaultValueBoolean: false
                  remarks: True when the user archived this exploration itself; false when it became archived because a parent collection was archived
                  constraints:
                    nullable: false
              - column:
                  name: collection_position
                  type: int
                  remarks: Ordering of pinned items within a collection; null = not pinned
                  constraints:
                    nullable: true
              - column:
                  name: entity_id
                  type: char(21)
                  remarks: NanoID for serdes
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: created_at
                  type: ${timestamp_type}
                  defaultValueComputed: current_timestamp
                  remarks: When the exploration was created
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: ${timestamp_type}
                  defaultValueComputed: current_timestamp
                  remarks: When the exploration was last updated
                  constraints:
                    nullable: false

  - changeSet:
      id: v63.92fasdf
      author: nvoxland
      comment: Index on exploration.creator_id
      changes:
        - createIndex:
            tableName: exploration
            indexName: idx_exploration_creator_id
            columns:
              - column:
                  name: creator_id

  - changeSet:
      id: v63.g442xf
      author: nvoxland
      comment: FK exploration.creator_id -> core_user.id
      changes:
        - addForeignKeyConstraint:
            baseTableName: exploration
            baseColumnNames: creator_id
            referencedTableName: core_user
            referencedColumnNames: id
            constraintName: fk_exploration_creator_id
            onDelete: CASCADE

  - changeSet:
      id: v63.expcollidx
      author: jdswanson
      comment: Index on exploration.collection_id
      changes:
        - createIndex:
            tableName: exploration
            indexName: idx_exploration_collection_id
            columns:
              - column:
                  name: collection_id

  - changeSet:
      id: v63.expcollfk
      author: jdswanson
      comment: FK exploration.collection_id -> collection.id
      changes:
        - addForeignKeyConstraint:
            baseTableName: exploration
            baseColumnNames: collection_id
            referencedTableName: collection
            referencedColumnNames: id
            constraintName: fk_exploration_collection_id
            onDelete: SET NULL

  - changeSet:
      id: v63.bnweradf
      author: nvoxland
      comment: Create exploration_thread table
      changes:
        - createTable:
            tableName: exploration_thread
            remarks: A hypothesis / iteration within an exploration.
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  remarks: Primary key
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: exploration_id
                  type: int
                  remarks: The exploration this thread belongs to
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: ${text.type}
                  remarks: Optional name for the thread / hypothesis
                  constraints:
                    nullable: true
              - column:
                  name: prompt
                  type: ${text.type}
                  remarks: Natural-language prompt the user typed for this thread
                  constraints:
                    nullable: true
              - column:
                  name: position
                  type: int
                  defaultValueNumeric: 0
                  remarks: Ordering of threads within an exploration
                  constraints:
                    nullable: false
              - column:
                  name: started_at
                  type: ${timestamp_type}
                  remarks: Set when the user clicks "Start exploration"; null means draft
                  constraints:
                    nullable: true
              - column:
                  name: entity_id
                  type: char(21)
                  remarks: NanoID for serdes
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: created_at
                  type: ${timestamp_type}
                  defaultValueComputed: current_timestamp
                  remarks: When the thread was created
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: ${timestamp_type}
                  defaultValueComputed: current_timestamp
                  remarks: When the thread was last updated
                  constraints:
                    nullable: false

  - changeSet:
      id: v63.g89asrdg
      author: nvoxland
      comment: Index on exploration_thread.exploration_id
      changes:
        - createIndex:
            tableName: exploration_thread
            indexName: idx_exploration_thread_exploration_id
            columns:
              - column:
                  name: exploration_id

  - changeSet:
      id: v63.gpores
      author: nvoxland
      comment: FK exploration_thread.exploration_id -> exploration.id
      changes:
        - addForeignKeyConstraint:
            baseTableName: exploration_thread
            baseColumnNames: exploration_id
            referencedTableName: exploration
            referencedColumnNames: id
            constraintName: fk_exploration_thread_exploration_id
            onDelete: CASCADE

  - changeSet:
      id: v63.expeidnull
      author: nvoxland
      comment: Make exploration.entity_id nullable so serdes drop-entity-ids! can NULL it
      changes:
        - dropNotNullConstraint:
            tableName: exploration
            columnName: entity_id
            columnDataType: char(21)

  - changeSet:
      id: v63.expthreadeidnull
      author: nvoxland
      comment: Make exploration_thread.entity_id nullable so serdes drop-entity-ids! can NULL it
      changes:
        - dropNotNullConstraint:
            tableName: exploration_thread
            columnName: entity_id
            columnDataType: char(21)

  - changeSet:
      id: v63.expthreadgroup
      author: johnswanson
      comment: Create exploration_thread_group table
      changes:
        - createTable:
            tableName: exploration_thread_group
            remarks: One Research-plan block selected on a thread — a set of metrics crossed with a set of dimensions. Immutable after create.
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  remarks: Primary key — surfaced to the FE as the group id
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: exploration_thread_id
                  type: int
                  remarks: The thread this group belongs to
                  constraints:
                    nullable: false
              - column:
                  name: metrics
                  type: ${text.type}
                  remarks: JSON array of selected metrics ({card_id, dimension_mappings}) for this block
                  constraints:
                    nullable: true
              - column:
                  name: dimensions
                  type: ${text.type}
                  remarks: JSON array of selected dimensions ({dimension_id, display_name, effective_type, semantic_type}) for this block
                  constraints:
                    nullable: true
              - column:
                  name: position
                  type: int
                  defaultValueNumeric: 0
                  remarks: Authoring order of the block within a thread
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: ${timestamp_type}
                  defaultValueComputed: current_timestamp
                  remarks: When the group was created
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: ${timestamp_type}
                  defaultValueComputed: current_timestamp
                  remarks: When the group was last updated
                  constraints:
                    nullable: false

  - changeSet:
      id: v63.etgthreadidx
      author: nvoxland
      comment: Index on exploration_thread_group.exploration_thread_id
      changes:
        - createIndex:
            tableName: exploration_thread_group
            indexName: idx_exploration_thread_group_thread_id
            columns:
              - column:
                  name: exploration_thread_id

  - changeSet:
      id: v63.expthreadgroupfk
      author: johnswanson
      comment: FK exploration_thread_group.exploration_thread_id -> exploration_thread.id
      changes:
        - addForeignKeyConstraint:
            baseTableName: exploration_thread_group
            baseColumnNames: exploration_thread_id
            referencedTableName: exploration_thread
            referencedColumnNames: id
            constraintName: fk_exploration_thread_group_thread_id
            onDelete: CASCADE

  - changeSet:
      id: v63.expgrouptype
      author: denisberezin
      comment: Add exploration_thread_group.type
      changes:
        - addColumn:
            tableName: exploration_thread_group
            columns:
              - column:
                  name: type
                  type: ${text.type}
                  remarks: Block anchor — "metric" or "dimension"
                  constraints:
                    nullable: true

  - changeSet:
      id: v63.iowdfzx
      author: nvoxland
      comment: Create exploration_query table
      changes:
        - createTable:
            tableName: exploration_query
            remarks: A chart definition produced when "Start exploration" is run on a thread.
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  remarks: Primary key
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: exploration_thread_id
                  type: int
                  remarks: The thread this query belongs to
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: ${text.type}
                  remarks: Optional display name for the chart
                  constraints:
                    nullable: true
              - column:
                  name: card_id
                  type: int
                  remarks: The metric Card this chart is for
                  constraints:
                    nullable: false
              - column:
                  name: database_id
                  type: int
                  remarks: Database the snapshot MBQL runs against, frozen alongside `dataset_query` at plan time. Lets the worker build the metadata provider and the data-permission gate read the database without parsing `dataset_query` or joining to the Card.
                  constraints:
                    nullable: false
              - column:
                  name: segment_id
                  type: int
                  remarks: Optional segment applied as a filter on top of (card, dimension); null for the unsegmented base query
                  constraints:
                    nullable: true
              - column:
                  name: dimension_id
                  type: ${text.type}
                  remarks: Virtual dimension ID used as the breakout for this chart
                  constraints:
                    nullable: false
              - column:
                  name: query_type
                  type: varchar(32)
                  defaultValue: default
                  remarks: Generator variant — one of default, day-of-week, month-of-year, hour-of-day, time-facet
                  constraints:
                    nullable: false
              - column:
                  name: display
                  type: varchar(64)
                  remarks: Chart display type (line, bar, etc.)
                  constraints:
                    nullable: true
              - column:
                  name: visualization_settings
                  type: ${text.type}
                  remarks: JSON visualization settings for this chart
                  constraints:
                    nullable: true
              - column:
                  name: dataset_query
                  type: ${text.type}
                  remarks: Snapshot MBQL produced at "Start" time
                  constraints:
                    nullable: false
              - column:
                  name: position
                  type: int
                  defaultValueNumeric: 0
                  remarks: Ordering of queries within a thread
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(32)
                  defaultValue: pending
                  remarks: Worker state machine; one of pending, running, done, error
                  constraints:
                    nullable: false
              - column:
                  name: error_message
                  type: ${text.type}
                  remarks: Error message captured when the worker fails to execute the query
                  constraints:
                    nullable: true
              - column:
                  name: started_at
                  type: ${timestamp_type}
                  remarks: When the worker started executing this query
                  constraints:
                    nullable: true
              - column:
                  name: finished_at
                  type: ${timestamp_type}
                  remarks: When the worker finished executing this query (success or error)
                  constraints:
                    nullable: true
              - column:
                  name: user_interestingness
                  type: int
                  remarks: Owner's interestingness rating; null = unrated, 0 = not interesting, 1 = hmm, 2 = interesting
                  constraints:
                    nullable: true
              - column:
                  name: entity_id
                  type: char(21)
                  remarks: NanoID for serdes
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: created_at
                  type: ${timestamp_type}
                  defaultValueComputed: current_timestamp
                  remarks: When the query was created
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: ${timestamp_type}
                  defaultValueComputed: current_timestamp
                  remarks: When the query was last updated
                  constraints:
                    nullable: false

  - changeSet:
      id: v63.badwes
      author: nvoxland
      comment: Index on exploration_query.exploration_thread_id
      changes:
        - createIndex:
            tableName: exploration_query
            indexName: idx_exploration_query_thread_id
            columns:
              - column:
                  name: exploration_thread_id

  - changeSet:
      id: v63.bwbaxcz
      author: nvoxland
      comment: FK exploration_query.exploration_thread_id -> exploration_thread.id
      changes:
        - addForeignKeyConstraint:
            baseTableName: exploration_query
            baseColumnNames: exploration_thread_id
            referencedTableName: exploration_thread
            referencedColumnNames: id
            constraintName: fk_exploration_query_thread_id
            onDelete: CASCADE

  - changeSet:
      id: v63.expquerycardidx
      author: nvoxland
      comment: Index on exploration_query.card_id
      changes:
        - createIndex:
            tableName: exploration_query
            indexName: idx_exploration_query_card_id
            columns:
              - column:
                  name: card_id

  - changeSet:
      id: v63.28easd
      author: nvoxland
      comment: FK exploration_query.card_id -> report_card.id
      changes:
        - addForeignKeyConstraint:
            baseTableName: exploration_query
            baseColumnNames: card_id
            referencedTableName: report_card
            referencedColumnNames: id
            constraintName: fk_exploration_query_card_id
            onDelete: CASCADE

  - changeSet:
      id: v63.expquerysegidx
      author: nvoxland
      comment: Index on exploration_query.segment_id
      changes:
        - createIndex:
            tableName: exploration_query
            indexName: idx_exploration_query_segment_id
            columns:
              - column:
                  name: segment_id

  - changeSet:
      id: v63.qsegfk
      author: johnswanson
      comment: FK exploration_query.segment_id -> segment.id
      changes:
        - addForeignKeyConstraint:
            baseTableName: exploration_query
            baseColumnNames: segment_id
            referencedTableName: segment
            referencedColumnNames: id
            constraintName: fk_exploration_query_segment_id
            onDelete: CASCADE

  - changeSet:
      id: v63.qstatusidx
      author: nvoxland
      comment: Index on exploration_query.status for the worker poll
      changes:
        - createIndex:
            tableName: exploration_query
            indexName: idx_exploration_query_status
            columns:
              - column:
                  name: status

  - changeSet:
      id: v63.qparams
      author: johnswanson
      comment: Add params JSON column to exploration_query (deferred MBQL recipe)
      changes:
        - addColumn:
            tableName: exploration_query
            columns:
              - column:
                  name: params
                  type: ${text.type}
                  remarks: JSON-encoded variant params consumed by the runner when finalizing the chart MBQL just before execution. Shape depends on variant — top-n-other carries a k; filtered-subset carries filter_values; per-value-time-series carries k plus value_index plus optional temporal_dimension_id.
                  constraints:
                    nullable: true

  - changeSet:
      id: v63.qdsetqnull
      author: johnswanson
      comment: Make exploration_query.dataset_query nullable (lazy build at execution)
      changes:
        - dropNotNullConstraint:
            tableName: exploration_query
            columnName: dataset_query
            columnDataType: ${text.type}

  - changeSet:
      id: v63.expqueryeidnull
      author: nvoxland
      comment: Make exploration_query.entity_id nullable so serdes drop-entity-ids! can NULL it
      changes:
        - dropNotNullConstraint:
            tableName: exploration_query
            columnName: entity_id
            columnDataType: char(21)

  - changeSet:
      id: v63.expqgroupcol
      author: johnswanson
      comment: Add exploration_query.group_id
      changes:
        - addColumn:
            tableName: exploration_query
            columns:
              - column:
                  name: group_id
                  type: int
                  remarks: The exploration_thread_group this query was planned under
                  constraints:
                    nullable: true

  - changeSet:
      id: v63.expqgroupidx
      author: johnswanson
      comment: Index exploration_query.group_id for read-side grouping
      changes:
        - createIndex:
            tableName: exploration_query
            indexName: idx_exploration_query_group_id
            columns:
              - column:
                  name: group_id

  - changeSet:
      id: v63.expqgroupfk
      author: johnswanson
      comment: FK exploration_query.group_id -> exploration_thread_group.id
      changes:
        - addForeignKeyConstraint:
            baseTableName: exploration_query
            baseColumnNames: group_id
            referencedTableName: exploration_thread_group
            referencedColumnNames: id
            constraintName: fk_exploration_query_group_id
            onDelete: CASCADE

  - changeSet:
      id: v63.expqgroupnotnull
      author: johnswanson
      comment: Make exploration_query.group_id NOT NULL
      changes:
        - addNotNullConstraint:
            tableName: exploration_query
            columnName: group_id
            columnDataType: int

  - changeSet:
      id: v63.qplanstate
      author: johnswanson
      comment: Add query_plan_started_at column to exploration_thread
      changes:
        - addColumn:
            tableName: exploration_thread
            columns:
              - column:
                  name: query_plan_started_at
                  type: ${timestamp_type}
                  remarks: CAS-claim marker for the background query-planning step. Set by the planning worker the moment it begins; subsequent workers skip threads whose marker is already set so planning runs exactly once per thread.
                  constraints:
                    nullable: true

  - changeSet:
      id: v63.h9yuhk
      author: johnswanson
      comment: Add query_plan_transcript column to exploration_thread
      changes:
        - addColumn:
            tableName: exploration_thread
            columns:
              - column:
                  name: query_plan_transcript
                  type: ${text.type}
                  remarks: EDN-encoded transcript of the LLM exchange (prompt + responses + validation errors + final plan) used to materialize this thread's exploration_query rows. Debug-only — not surfaced to the user.
                  constraints:
                    nullable: true
